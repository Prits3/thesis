<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TLGG Search</title>
  <style>
    :root {
      --bg: #f5efe5;
      --text: #1f1f1f;
      --panel: #fffaf2;
      --accent: #005f73;
      --line: #d7c9b4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: radial-gradient(circle at top right, #f0d9b5, var(--bg));
      color: var(--text);
    }
    .wrap {
      max-width: 900px;
      margin: 40px auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
    }
    h1 { margin-top: 0; }
    form { display: flex; gap: 8px; margin-bottom: 16px; }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 12px 16px;
      background: var(--accent);
      color: white;
      font-size: 15px;
      cursor: pointer;
    }
    .error {
      margin: 12px 0;
      padding: 10px;
      border-radius: 8px;
      background: #ffe8e5;
      border: 1px solid #efb7ae;
    }
    .result {
      border-top: 1px solid var(--line);
      padding: 14px 0;
    }
    .result h3 { margin: 0 0 6px; text-transform: capitalize; }
    .muted { color: #555; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>TLGG Slide Search</h1>
    <p class="muted">Search by title, context, section title, or section details.</p>

    <form method="post">
      <input type="text" name="query" value="{{ query }}" placeholder="Type your question..." required>
      <button type="submit">Search</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    {% if query %}
      <p><strong>{{ results|length }}</strong> result(s) for "{{ query }}"</p>
    {% endif %}

    {% for item in results %}
      <article class="result">
        <h3>{{ item.title }}</h3>
        <p>{{ item.context }}</p>
      </article>
    {% endfor %}
  </main>
</body>
</html>
